<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      .container {
        max-width: 350px;
      }

      .attribution {
        font-size: 11px;
        text-align: center;
        margin-top: 20px;
      }

      .attribution a {
        color: hsl(228, 45%, 44%);
      }

      .badge-custom {
        background-color: #f4ce47;
        color: black;
        font-weight: 600;
        padding: 0.4em 0.8em;
        border-radius: 0.5rem;
        display: inline-block;
      }

      .card-body p {
        margin-bottom: 0.5rem;
      }

      .author {
        font-weight: 700;
      }
    </style>
  </head>

  <body
    class="d-flex flex-column justify-content-center align-items-center min-vh-100 bg-warning"
  >
    <div class="container bg-white p-3 rounded shadow">
      <img
        src="./assets/images/illustration-article.svg"
        alt="illustration-article"
        class="rounded mb-3 w-100"
      />

      <span class="badge-custom mb-2">Learning</span>
      <p class="text-muted mb-2">Published 21 Dec 2023</p>

      <h4 class="fw-bold">HTML & CSS foundations</h4>
      <p class="text-muted">
        These languages are the backbone of every website, defining structure,
        content, and presentation.
      </p>

      <div class="d-flex align-items-center gap-3 mt-3">
        <img
          src="./assets/images/image-avatar.webp"
          alt="image-avatar"
          class="rounded-circle"
          style="width: 40px; height: 40px"
        />
        <p class="author mb-0">Greg Hooper</p>
      </div>
    </div>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#"> Manichadana</a>.
    </div>
  </body>
</html>
